---
definitions: {}
info:
  description: powered by Flasgger
  termsOfService: "/tos"
  title: Spring Manufacturing PLM API
  version: 0.0.1
paths:
  "/api/v1/analytics/financials":
    get:
      responses:
        '200':
          description: Financial metrics including sales and pending revenue
          schema:
            properties:
              collected_revenue:
                description: Sum of paid invoices
                type: number
              pending_revenue:
                description: Sum of unpaid invoices
                type: number
              total_revenue:
                description: Sum of all invoices
                type: number
            type: object
      summary: Get financial metrics for dashboards (User Story 6.1, 6.3)
      tags:
      - Analytics (Epic 6)
  "/api/v1/analytics/production":
    get:
      responses:
        '200':
          description: Production metrics by machine
      summary: Get machine utilization and production efficiency (User Story 6.2,
        6.3)
      tags:
      - Analytics (Epic 6)
  "/api/v1/customers":
    get:
      responses:
        '200':
          description: A list of customers
          schema:
            items:
              properties:
                company_name:
                  type: string
                customer_id:
                  type: integer
                name:
                  type: string
              type: object
            type: array
      summary: Retrieve a list of all customers
      tags:
      - Customers
  "/api/v1/enquiries":
    get:
      responses:
        '200':
          description: A list of all enquiries
          schema:
            items:
              properties:
                created_at:
                  type: string
                customer_id:
                  type: integer
                enquiry_id:
                  type: integer
                status:
                  type: string
              type: object
            type: array
      summary: Fetch all customer enquiries
      tags:
      - Enquiries
  "/api/v1/enquiries/{enquiry_id}":
    get:
      parameters:
      - in: path
        name: enquiry_id
        required: true
        type: integer
      responses:
        '200':
          description: Detailed enquiry information
        '404':
          description: Enquiry not found
      summary: Fetch details of a specific enquiry by ID
      tags:
      - Enquiries
  "/api/v1/enquiries/{enquiry_id}/quotations":
    get:
      parameters:
      - in: path
        name: enquiry_id
        required: true
        type: integer
      responses:
        '200':
          description: A list of quotations linked to the enquiry
        '404':
          description: Enquiry not found
      summary: Fetch all quotations for a specific enquiry
      tags:
      - Quotations
  "/api/v1/invoices/{invoice_id}/pay":
    put:
      parameters:
      - in: path
        name: invoice_id
        required: true
        type: integer
      responses:
        '200':
          description: Invoice marked as paid
      summary: Mark an invoice as paid
      tags:
      - Invoicing (Epic 4)
  "/api/v1/machines":
    get:
      responses:
        '200':
          description: List of all machines and their current status
      summary: View machine status and capacity (User Story 2.3)
      tags:
      - Production Planning (Epic 2)
  "/api/v1/materials":
    get:
      responses:
        '200':
          description: List of available materials and stock quantities
          schema:
            items:
              properties:
                material_id:
                  type: integer
                name:
                  type: string
                stock_quantity:
                  type: number
              type: object
            type: array
      summary: Check raw material inventory (User Story 2.1)
      tags:
      - Production Planning (Epic 2)
  "/api/v1/orders/{order_id}/invoice":
    post:
      parameters:
      - in: path
        name: order_id
        required: true
        type: integer
      - in: body
        name: body
        required: false
        schema:
          properties:
            manual_amount:
              description: Optional manual override for custom pricing (US 4.2)
              format: float
              type: number
          type: object
      responses:
        '201':
          description: Invoice generated successfully
        '400':
          description: Order not ready for invoicing
        '404':
          description: Order not found
      summary: Generate an invoice for a completed order (User Stories 4.1, 4.2)
      tags:
      - Invoicing (Epic 4)
  "/api/v1/orders/{order_id}/shipment":
    post:
      parameters:
      - in: path
        name: order_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            carrier:
              example: FedEx Freight
              type: string
            tracking_number:
              example: TRK-987654321
              type: string
          required:
          - carrier
          - tracking_number
          type: object
      responses:
        '201':
          description: Shipment dispatched successfully
      summary: Dispatch an order and generate tracking details (User Story 5.1)
      tags:
      - Delivery Status (Epic 5)
  "/api/v1/quotations/{quote_id}/accept":
    post:
      parameters:
      - description: The ID of the accepted quotation
        in: path
        name: quote_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            spring_id:
              description: The ID of the Spring Master component being ordered
              example: 1
              type: integer
          required:
          - spring_id
          type: object
      responses:
        '201':
          description: Order created successfully
        '400':
          description: Quotation already accepted
        '404':
          description: Quotation or Spring not found
      summary: Convert an accepted quotation into a confirmed production order (User
        Story 1.5)
      tags:
      - Quotations
      - Orders
  "/api/v1/quotations/{quote_id}/revise":
    post:
      parameters:
      - description: The ID of the existing quotation to revise
        in: path
        name: quote_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            est_delivery:
              example: '2026-04-25'
              format: date
              type: string
            price:
              example: 1400
              format: float
              type: number
          type: object
      responses:
        '201':
          description: New quotation version created
        '404':
          description: Original quotation not found
      summary: Revise quotation terms with version control (User Story 1.4)
      tags:
      - Quotations
  "/api/v1/shipments/{shipment_id}/delivery":
    put:
      parameters:
      - in: path
        name: shipment_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            delivery_status:
              example: Delivered & Accepted
              type: string
            rejection_reason:
              description: Required if delivery_status is Rejected
              example: Springs failed load test at customer site
              type: string
          required:
          - delivery_status
          type: object
      responses:
        '200':
          description: Delivery status updated
      summary: Record final delivery acceptance or rejection (User Stories 5.1, 5.2)
      tags:
      - Delivery Status (Epic 5)
  "/api/v1/tasks":
    post:
      parameters:
      - in: body
        name: body
        required: true
        schema:
          properties:
            machine_id:
              type: integer
            material_id:
              type: integer
            material_required:
              description: Amount of material to reserve/deduct
              type: number
            order_id:
              type: integer
            scheduled_at:
              example: '2026-04-10T08:00:00'
              format: date-time
              type: string
          required:
          - order_id
          - machine_id
          - material_id
          - scheduled_at
          - material_required
          type: object
      responses:
        '201':
          description: Task scheduled successfully
        '400':
          description: Insufficient material or invalid input
        '404':
          description: Resource not found
      summary: Schedule a production task and reserve materials (User Stories 2.1,
        2.4)
      tags:
      - Production Planning (Epic 2)
  "/api/v1/tasks/{task_id}/quality":
    post:
      parameters:
      - in: path
        name: task_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            inspector:
              example: John Doe
              type: string
            result:
              example: Approved
              type: string
          required:
          - inspector
          - result
          type: object
      responses:
        '201':
          description: Quality report saved
      summary: Record inspection results (User Stories 3.4, 3.5)
      tags:
      - Production Execution (Epic 3)
  "/api/v1/tasks/{task_id}/status":
    put:
      parameters:
      - in: path
        name: task_id
        required: true
        type: integer
      - in: body
        name: body
        required: true
        schema:
          properties:
            status:
              example: In Progress
              type: string
          type: object
      responses:
        '200':
          description: Task status updated
      summary: Track current production stage (User Story 3.3)
      tags:
      - Production Execution (Epic 3)
swagger: '2.0'
